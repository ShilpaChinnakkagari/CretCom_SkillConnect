<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="SkillConnect - Find trusted local service providers near you" />
    <title>SkillConnect - Local Services Marketplace</title>
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- ===== GOOGLE TRANSLATE EMBED (IN-PAGE) ===== -->
    <div id="google_translate_element" style="display: none;"></div>
    
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'hi,te,ta,kn,ml,mr,gu,bn,pa,or,as',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
        
        // Trigger translation when language is selected
        document.addEventListener('DOMContentLoaded', function() {
          const select = document.querySelector('.goog-te-combo');
          if (select) {
            // Store reference to the select element
            window.googTranslateSelect = select;
          }
        });
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <!-- ===== END ===== -->
  </body>
</html>
